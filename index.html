<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音转文字</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>语音转文字</h1>
      <p class="subtitle">使用浏览器原生语音识别</p>
    </header>

    <div class="controls">
      <div class="select-wrapper">
        <select id="language-select">
          <option value="zh-CN">中文</option>
          <option value="en-US">English</option>
          <option value="ja-JP">日本語</option>
          <option value="ko-KR">한국어</option>
        </select>
      </div>
      <button id="control-btn" class="btn start">
        <span class="icon">🎤</span>
        <span class="text">开始录音</span>
      </button>
    </div>

    <div class="result-area">
      <textarea id="result" placeholder="识别结果将显示在这里..." readonly></textarea>
    </div>

    <div class="status-bar">
      <span id="status-indicator" class="indicator idle"></span>
      <span id="status-text" class="status-text">就绪</span>
    </div>

    <div id="error-message" class="error-message hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
